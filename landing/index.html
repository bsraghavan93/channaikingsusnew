<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chennai Kings — Authentic Tamil Nadu Cuisine · San Francisco</title>
  <meta name="description" content="Chennai Kings — Authentic Tamil Nadu cuisine at Fisherman's Wharf, San Francisco. Party hall & banquet hall available.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Kolam dot-grid background ── -->
  <div class="kolam-bg" aria-hidden="true"></div>

  <!-- ── Ambient banner image ── -->
  <div class="banner-overlay" aria-hidden="true"></div>

  <!-- ── Floating lamp flames ── -->
  <div class="flames-wrap" aria-hidden="true">
    <span class="flame f1"></span>
    <span class="flame f2"></span>
    <span class="flame f3"></span>
    <span class="flame f4"></span>
    <span class="flame f5"></span>
  </div>

  <!-- ── Temple gopuram silhouette at bottom ── -->
  <div class="temple-wrap" aria-hidden="true">
    <svg class="temple-svg" viewBox="0 0 1440 320" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
      <!-- Left gopuram -->
      <g transform="translate(0,0)">
        <rect x="60" y="180" width="80" height="140" fill="currentColor"/>
        <rect x="72" y="160" width="56" height="30" fill="currentColor"/>
        <rect x="80" y="140" width="40" height="28" fill="currentColor"/>
        <rect x="86" y="122" width="28" height="24" fill="currentColor"/>
        <rect x="91" y="106" width="18" height="20" fill="currentColor"/>
        <rect x="94" y="92" width="12" height="18" fill="currentColor"/>
        <rect x="97" y="80" width="6" height="14" fill="currentColor"/>
        <rect x="99" y="70" width="2" height="12" fill="currentColor"/>
        <!-- tier decorations -->
        <rect x="65" y="175" width="70" height="6" fill="currentColor" opacity="0.6"/>
        <rect x="74" y="156" width="52" height="5" fill="currentColor" opacity="0.6"/>
        <rect x="82" y="137" width="36" height="4" fill="currentColor" opacity="0.6"/>
        <rect x="88" y="119" width="24" height="4" fill="currentColor" opacity="0.6"/>
        <rect x="93" y="103" width="14" height="3" fill="currentColor" opacity="0.6"/>
      </g>
      <!-- Right gopuram -->
      <g transform="translate(1240,0)">
        <rect x="60" y="180" width="80" height="140" fill="currentColor"/>
        <rect x="72" y="160" width="56" height="30" fill="currentColor"/>
        <rect x="80" y="140" width="40" height="28" fill="currentColor"/>
        <rect x="86" y="122" width="28" height="24" fill="currentColor"/>
        <rect x="91" y="106" width="18" height="20" fill="currentColor"/>
        <rect x="94" y="92" width="12" height="18" fill="currentColor"/>
        <rect x="97" y="80" width="6" height="14" fill="currentColor"/>
        <rect x="99" y="70" width="2" height="12" fill="currentColor"/>
        <rect x="65" y="175" width="70" height="6" fill="currentColor" opacity="0.6"/>
        <rect x="74" y="156" width="52" height="5" fill="currentColor" opacity="0.6"/>
        <rect x="82" y="137" width="36" height="4" fill="currentColor" opacity="0.6"/>
        <rect x="88" y="119" width="24" height="4" fill="currentColor" opacity="0.6"/>
        <rect x="93" y="103" width="14" height="3" fill="currentColor" opacity="0.6"/>
      </g>
      <!-- Centre main gopuram -->
      <g transform="translate(560,0)">
        <rect x="60" y="130" width="200" height="190" fill="currentColor"/>
        <rect x="75" y="105" width="170" height="35" fill="currentColor"/>
        <rect x="88" y="82" width="144" height="30" fill="currentColor"/>
        <rect x="100" y="62" width="120" height="26" fill="currentColor"/>
        <rect x="112" y="44" width="96" height="22" fill="currentColor"/>
        <rect x="122" y="28" width="76" height="20" fill="currentColor"/>
        <rect x="132" y="14" width="56" height="18" fill="currentColor"/>
        <rect x="142" y="4" width="36" height="12" fill="currentColor"/>
        <rect x="152" y="0" width="16" height="6" fill="currentColor"/>
        <!-- tier lines -->
        <rect x="66" y="125" width="188" height="7" fill="currentColor" opacity="0.55"/>
        <rect x="78" y="100" width="164" height="6" fill="currentColor" opacity="0.55"/>
        <rect x="91" y="77" width="138" height="6" fill="currentColor" opacity="0.55"/>
        <rect x="103" y="57" width="114" height="5" fill="currentColor" opacity="0.55"/>
        <rect x="115" y="39" width="90" height="5" fill="currentColor" opacity="0.55"/>
        <rect x="125" y="24" width="70" height="4" fill="currentColor" opacity="0.55"/>
        <rect x="135" y="10" width="50" height="4" fill="currentColor" opacity="0.55"/>
        <!-- arch entrance -->
        <rect x="130" y="240" width="60" height="80" rx="30" fill="rgba(0,0,0,0.4)"/>
        <!-- side sub-towers -->
        <rect x="30" y="200" width="40" height="120" fill="currentColor" opacity="0.8"/>
        <rect x="36" y="185" width="28" height="20" fill="currentColor" opacity="0.8"/>
        <rect x="41" y="170" width="18" height="18" fill="currentColor" opacity="0.8"/>
        <rect x="45" y="158" width="10" height="14" fill="currentColor" opacity="0.8"/>
        <rect x="250" y="200" width="40" height="120" fill="currentColor" opacity="0.8"/>
        <rect x="256" y="185" width="28" height="20" fill="currentColor" opacity="0.8"/>
        <rect x="261" y="170" width="18" height="18" fill="currentColor" opacity="0.8"/>
        <rect x="265" y="158" width="10" height="14" fill="currentColor" opacity="0.8"/>
      </g>
      <!-- Ground base -->
      <rect x="0" y="300" width="1440" height="20" fill="currentColor"/>
      <!-- Connecting base walls -->
      <rect x="140" y="280" width="420" height="40" fill="currentColor" opacity="0.6"/>
      <rect x="880" y="280" width="420" height="40" fill="currentColor" opacity="0.6"/>
    </svg>
  </div>

  <!-- ── Kolam / Rangoli decorative ring ── -->
  <div class="kolam-ring" aria-hidden="true">
    <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="rgba(200,146,42,0.25)" stroke-width="1">
        <circle cx="150" cy="150" r="140"/>
        <circle cx="150" cy="150" r="118"/>
        <circle cx="150" cy="150" r="96"/>
        <circle cx="150" cy="150" r="74"/>
        <circle cx="150" cy="150" r="52"/>
        <circle cx="150" cy="150" r="30"/>
        <!-- petals outer -->
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10"/>
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10" transform="rotate(45,150,150)"/>
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10" transform="rotate(90,150,150)"/>
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10" transform="rotate(135,150,150)"/>
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10" transform="rotate(180,150,150)"/>
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10" transform="rotate(225,150,150)"/>
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10" transform="rotate(270,150,150)"/>
        <path d="M150,10 Q170,60 150,100 Q130,60 150,10" transform="rotate(315,150,150)"/>
        <!-- inner petals -->
        <path d="M150,78 Q162,114 150,140 Q138,114 150,78"/>
        <path d="M150,78 Q162,114 150,140 Q138,114 150,78" transform="rotate(60,150,150)"/>
        <path d="M150,78 Q162,114 150,140 Q138,114 150,78" transform="rotate(120,150,150)"/>
        <path d="M150,78 Q162,114 150,140 Q138,114 150,78" transform="rotate(180,150,150)"/>
        <path d="M150,78 Q162,114 150,140 Q138,114 150,78" transform="rotate(240,150,150)"/>
        <path d="M150,78 Q162,114 150,140 Q138,114 150,78" transform="rotate(300,150,150)"/>
        <!-- dot ring -->
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none"/>
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none" transform="rotate(45,150,150)"/>
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none" transform="rotate(90,150,150)"/>
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none" transform="rotate(135,150,150)"/>
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none" transform="rotate(180,150,150)"/>
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none" transform="rotate(225,150,150)"/>
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none" transform="rotate(270,150,150)"/>
        <circle cx="150" cy="14" r="3" fill="rgba(200,146,42,0.4)" stroke="none" transform="rotate(315,150,150)"/>
      </g>
      <!-- centre dot -->
      <circle cx="150" cy="150" r="5" fill="rgba(200,146,42,0.5)"/>
    </svg>
  </div>

  <!-- ── Main stage ── -->
  <main class="landing-stage" id="landing" role="main">

    <div class="brand-lockup">
      <!-- Logo -->
      <div class="logo-wrap seq-1">
        <img src="../assets/logo_full.png" alt="Chennai Kings" class="brand-logo">
      </div>

      <!-- Eyebrow -->
      <p class="brand-eyebrow seq-2">Est. 2014 &nbsp;·&nbsp; Fisherman's Wharf, San Francisco</p>

      <!-- Title -->
      <h1 class="brand-title seq-3">
        C&#8204;H&#8204;E&#8204;N&#8204;N&#8204;A&#8204;I<br>
        <span class="brand-title-kings">K&#8204;I&#8204;N&#8204;G&#8204;S</span>
      </h1>

      <!-- Divider ornament -->
      <div class="ornament seq-4" aria-hidden="true">
        <span class="ornament-line"></span>
        <span class="ornament-diamond"></span>
        <span class="ornament-line"></span>
      </div>

      <!-- Sub tagline -->
      <p class="brand-sub seq-5">Authentic Tamil Nadu Cuisine</p>

      <!-- Feature pills -->
      <div class="brand-pills seq-6">
        <span class="brand-pill">Fine Dining</span>
        <span class="brand-pill brand-pill--highlight">Party Hall</span>
        <span class="brand-pill brand-pill--highlight">Banquet Hall</span>
        <span class="brand-pill">Catering</span>
      </div>
    </div>

    <!-- Click anywhere prompt -->
    <div class="enter-prompt seq-7" aria-label="Click anywhere to enter">
      <span class="enter-pulse"></span>
      Click anywhere to enter
    </div>

  </main>

  <script>
    // Navigate to main site on any click / tap / keypress
    function enter() {
      document.body.classList.add('exiting');
      setTimeout(() => { window.location.href = '../main/'; }, 700);
    }
    document.addEventListener('click', enter);
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') enter();
    });
  </script>
</body>
</html>
